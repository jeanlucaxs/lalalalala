<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tituloPagina"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --azul-escuro: #0a192f;
            --azul-claro: #007bff;
            --azul-hover: #0056b3;
            --texto-claro: #e6f1ff;
            --texto-cinza: #8892b0;
            --bg-card: rgba(17, 34, 64, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--azul-escuro); color: var(--texto-claro); line-height: 1.6; overflow-x: hidden; }

        header {
            position: fixed; width: 100%; padding: 15px 10%;
            background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(0, 123, 255, 0.2);
        }
        
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: auto; }
        
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--azul-claro); letter-spacing: 2px; }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--texto-claro); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
        nav a:hover { color: var(--azul-claro); }

        section { padding: 100px 10%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .section-title { font-size: 2.5rem; text-align: center; margin-bottom: 40px; color: var(--azul-claro); }
        .highlight { color: var(--azul-claro); font-weight: bold; }

        #inicio { text-align: center; background: radial-gradient(circle at top right, #112240, #0a192f); }
        #inicio h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 15px; }
        #inicio p { font-size: 1.1rem; color: var(--texto-cinza); max-width: 700px; margin: 0 auto 30px; }

        .btn-cta {
            padding: 15px 35px; background: var(--azul-claro); color: white;
            text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; display: inline-block;
        }
        .btn-cta:hover { background: var(--azul-hover); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        #sobre { position: relative; overflow: hidden; }
        #sobre::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 70%;
            background-image: url('midias/logojeaxlabs.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.05;
            z-index: 0;
            pointer-events: none;
        }
        .sobre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; position: relative; z-index: 1; }
        .sobre-texto h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .sobre-icon { text-align: center; font-size: 12rem; color: rgba(0, 123, 255, 0.05); }

        .grid-apps { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: var(--bg-card); padding: 30px; border-radius: 12px;
            border: 1px solid rgba(0, 123, 255, 0.1); transition: 0.3s; cursor: pointer; text-align: center;
        }
        .card:hover { border-color: var(--azul-claro); transform: translateY(-8px); background: rgba(17, 34, 64, 0.9); }
        .card i { font-size: 2.5rem; color: var(--azul-claro); margin-bottom: 20px; }
        .card h3 { margin-bottom: 10px; }
        .card .preco-tag { font-size: 1.4rem; font-weight: bold; color: #25d366; margin: 15px 0; display: block; }
        .card .btn-ver { color: var(--azul-claro); font-weight: bold; font-size: 0.8rem; letter-spacing: 1px; border: 1px solid; padding: 5px 10px; border-radius: 4px; }

        /* NOVO: ESTILO DO BOX DE CONTATO IGUAL AO SITE */
        .contato-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(0, 123, 255, 0.2);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
        .contato-item { margin: 20px 0; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .contato-item i { color: var(--azul-claro); font-size: 1.5rem; }
        .contato-item a { color: var(--texto-claro); text-decoration: none; transition: 0.3s; }
        .contato-item a:hover { color: var(--azul-claro); }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: #112240; width: 100%; max-width: 800px; padding: 30px;
            border-radius: 15px; border: 1px solid var(--azul-claro); position: relative;
            max-height: 90vh; overflow-y: auto; text-align: center;
        }
        .fechar-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--texto-cinza); }
        .galeria-modal { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .galeria-modal img { width: 100%; border-radius: 5px; cursor: pointer; }

        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        footer { text-align: center; padding: 40px; color: var(--texto-cinza); border-top: 1px solid rgba(0, 123, 255, 0.1); }

        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; }
            .sobre-grid { grid-template-columns: 1fr; text-align: center; }
            .sobre-icon { display: none; }
            .galeria-modal { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="midias/logoj.png" alt="J" class="logo-img">
            <div class="logo" id="headerLogo"></div>
        </div>
        <nav id="navLinks"></nav>
    </header>

    <section id="inicio">
        <h1 id="heroTitulo"></h1>
        <p id="heroDesc"></p>
        <div><a href="#personalizado" class="btn-cta" id="heroBtn"></a></div>
    </section>

    <section id="sobre">
        <div class="sobre-grid">
            <div class="sobre-texto" id="sobreCorpo"></div>
            <div class="sobre-icon"><i class="fas fa-microchip"></i></div>
        </div>
    </section>

    <section id="apps">
        <h2 class="section-title">Nossos Aplicativos</h2>
        <div class="grid-apps" id="containerApps"></div>
    </section>

    <section id="personalizado">
        <div style="text-align: center; border: 2px dashed var(--azul-claro); padding: 50px; border-radius: 15px;" id="boxPersonalizado"></div>
    </section>

    <section id="contato">
        <h2 class="section-title">Contato Direto</h2>
        <div class="contato-box">
            <div class="contato-item">
                <i class="fab fa-whatsapp"></i>
                <a href="" id="linkWhatsTexto" target="_blank"></a>
            </div>
            <div class="contato-item">
                <i class="fas fa-envelope"></i>
                <a href="mailto:contato@jeaxlabs.com.br">contato@jeaxlabs.com.br</a>
            </div>
            
        </div>
    </section>

    <footer id="footerSec">
        <p id="footerTexto"></p>
    </footer>

    <div id="appModal" class="modal" onclick="fecharModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="fechar-modal" onclick="fecharModal()">&times;</span>
            <div id="modalCorpo"></div>
        </div>
    </div>

    <a href="" class="whatsapp-float" target="_blank" id="floatWhats"><i class="fab fa-whatsapp"></i></a>

    <script>
        /* ========= CONTROLE DE DADOS (EDITE AQUI) ========= */
        const info = {
            config: {
                nomeEmpresa: "JeaxLabs",
                tituloSite: "JeaxLabs | Soluções em Software",
                whatsapp: "5542999587464",
                cidade: ""
            },
            hero: {
                titulo: "Sistemas que Impulsionam Negócios",
                desc: "Desenvolvemos softwares robustos para PC com foco na simplicidade no uso, e poder na execução",
                botao: "Solicitar Projeto Personalizado"
            },
            sobre: {
                titulo: "Inovação com Confiança",
                texto: `A <span class="highlight">JeaxLabs</span> nasceu para simplificar a tecnologia. Especializada em sistemas de gerenciamento para pequenas empresas, escolas e comércios, nossa missão é entregar ferramentas que qualquer colaborador consiga operar com facilidade, sem abrir mão da segurança de dados.`
            },
            menu: { "Início": "#inicio", "Sobre": "#sobre", "Apps Prontos": "#apps", "Apps Personalizados": "#personalizado", "Contato": "#contato" },
            apps: [
                { id: "biblioteca", nome: "Gestão de Biblioteca", preco: "R$ 150,00", desc: "Controle total de livros, usuários e empréstimos", icone: "fa-book" },
                { id: "posloja", nome: "POS System: Lojas", preco: "R$ 250,00", desc: "Frente de caixa rápido, controle total de vendas", icone: "fa-cash-register" },
                { id: "posrestaurante", nome: "POS System: Restaurantes", preco: "R$ 200,00", desc: "Gestão de inventário e relatórios automáticos.", icone: "fa-utensils" }
            ],
            personalizado: {
                titulo: "Seu App, Suas Regras!",
                desc: "Tem uma ideia única ou precisa de uma função específica que não encontra em lugar nenhum? Nós adoramos desafios!",
                obs: "*Consulte nossas condições para módulos de personalização adicional.",
                botao: "Quero fazer um Projeto Personalizado"
            }
        };

        /* ========= LÓGICA DO SITE ========= */
        document.getElementById('tituloPagina').innerText = info.config.tituloSite;
        document.getElementById('headerLogo').innerHTML = `${info.config.nomeEmpresa.slice(0,4)}<span style="color:white">${info.config.nomeEmpresa.slice(4)}</span>`;
        document.getElementById('heroTitulo').innerText = info.hero.titulo;
        document.getElementById('heroDesc').innerText = info.hero.desc;
        document.getElementById('heroBtn').innerText = info.hero.botao;
        document.getElementById('footerTexto').innerHTML = `&copy; 2026 ${info.config.nomeEmpresa} - Todos os direitos reservados.`;
        
        // WhatsApp Links
        const waLink = `https://wa.me/${info.config.whatsapp}`;
        document.getElementById('floatWhats').href = waLink;
        document.getElementById('linkWhatsTexto').href = waLink;
        document.getElementById('linkWhatsTexto').innerText = `+${info.config.whatsapp}`;
        
        document.getElementById('sobreCorpo').innerHTML = `<h2 class="highlight">${info.sobre.titulo}</h2><p>${info.sobre.texto}</p>`;

        const nav = document.getElementById('navLinks');
        Object.entries(info.menu).forEach(([label, link]) => { nav.innerHTML += `<a href="${link}">${label}</a>`; });

        const container = document.getElementById('containerApps');
        info.apps.forEach(app => {
            container.innerHTML += `
                <div class="card" onclick="abrirModal('${app.id}')">
                    <i class="fas ${app.icone}"></i>
                    <h3>${app.nome}</h3>
                    <span class="preco-tag">${app.preco}</span>
                    <p>${app.desc}</p>
                    <div class="btn-ver">VER DETALHES</div>
                </div>
            `;
        });

        document.getElementById('boxPersonalizado').innerHTML = `
            <h2>${info.personalizado.titulo}</h2>
            <p style="margin:20px 0;">${info.personalizado.desc}</p>
            <p style="font-size: 0.8rem; color: var(--texto-cinza); margin-bottom: 20px; font-style: italic;">${info.personalizado.obs}</p>
            <a href="${waLink}" class="btn-cta">${info.personalizado.botao}</a>
        `;

        function abrirModal(appId) {
            const app = info.apps.find(a => a.id === appId);
            const corpo = document.getElementById('modalCorpo');
            corpo.innerHTML = `
                <h2 class="highlight">${app.nome}</h2>
                <div class="galeria-modal">
                    ${[1,2,3,4,5,6,7,8].map(n => `<img src="midias/${app.id}/${n}.png" onerror="this.src='https://via.placeholder.com/200x120/112240/007bff?text=Preview+${n}'">`).join('')}
                </div>
                <a href="${waLink}?text=Interesse: ${app.nome}" class="btn-cta" target="_blank">ADQUIRIR POR ${app.preco}</a>
            `;
            document.getElementById('appModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() { document.getElementById('appModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
